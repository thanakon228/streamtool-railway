<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Alert Widget — StreamTool</title>
  <link id="tpl-css" rel="stylesheet" href="/templates/classic.css">
  <style id="tpl-custom"></style>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;background:transparent;overflow:hidden;
      font-family:'Segoe UI','Noto Sans Thai',system-ui,sans-serif;perspective:1200px;}

    #alert-zone{position:fixed;width:420px;pointer-events:none;top:40px;right:40px;}
    body.pos-top-left     #alert-zone{top:40px;left:40px;right:auto;bottom:auto;}
    body.pos-bottom-right #alert-zone{bottom:40px;right:40px;left:auto;top:auto;}
    body.pos-bottom-left  #alert-zone{bottom:40px;left:40px;right:auto;top:auto;}

    #alert-card{
      background:var(--t-alert-bg);border:1.5px solid var(--t-alert-border);
      border-radius:var(--t-alert-radius,18px);box-shadow:var(--t-alert-shadow);
      overflow:hidden;position:relative;opacity:0;will-change:transform,opacity;
      transition:opacity .4s cubic-bezier(.34,1.3,.64,1),transform .4s cubic-bezier(.34,1.3,.64,1);
    }
    #alert-card.hide{transition:opacity .28s ease-in,transform .28s ease-in !important;}
    #alert-card.show .alert-avatar{animation:avatarPop .5s cubic-bezier(.34,1.56,.64,1) .18s both;}
    #alert-card.show .alert-amount{animation:amountPop .5s cubic-bezier(.34,1.56,.64,1) .28s both;}
    @keyframes avatarPop{from{transform:scale(0) rotate(-12deg)}to{transform:scale(1) rotate(0)}}
    @keyframes amountPop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}

    .alert-bar{height:3px;background:var(--t-alert-bar);background-size:300% 100%;animation:gradShift 4s linear infinite;}
    @keyframes gradShift{0%{background-position:0%}100%{background-position:300%}}
    .alert-body{padding:16px 20px 20px;}
    .alert-header{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
    .alert-avatar{width:52px;height:52px;border-radius:50%;background:var(--t-avatar-bg);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 0 20px var(--t-avatar-glow);}
    .alert-name-wrap{flex:1;min-width:0;}
    .alert-label{font-size:10px;color:var(--t-alert-label);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px;}
    .alert-name{font-size:17px;font-weight:700;color:var(--t-alert-name);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .alert-amount{font-size:30px;font-weight:900;color:var(--t-alert-amount);text-shadow:0 0 22px var(--t-alert-amount-glow);white-space:nowrap;flex-shrink:0;}
    .alert-message{font-size:13px;color:var(--t-alert-msg-color);line-height:1.55;background:var(--t-alert-msg-bg);border-radius:9px;padding:10px 14px;margin-top:2px;border-left:2px solid var(--t-alert-msg-border);}

    body.anim-slide #alert-card{transform:translateX(460px) scale(.92);}
    body.anim-slide #alert-card.show{transform:translateX(0) scale(1);opacity:1;}
    body.anim-slide #alert-card.hide{transform:translateX(460px) scale(.92);opacity:0;}
    body.pos-top-left.anim-slide #alert-card{transform:translateX(-460px) scale(.92);}
    body.pos-top-left.anim-slide #alert-card.show{transform:translateX(0) scale(1);opacity:1;}
    body.pos-top-left.anim-slide #alert-card.hide{transform:translateX(-460px) scale(.92);opacity:0;}
    body.anim-bounce #alert-card{transform:translateY(-90px) scale(.85);opacity:0;}
    body.anim-bounce #alert-card.show{transform:translateY(0) scale(1);opacity:1;transition:opacity .35s ease,transform .55s cubic-bezier(.22,1.8,.36,1);}
    body.anim-bounce #alert-card.hide{transform:translateY(-60px) scale(.88);opacity:0;}
    body.anim-zoom   #alert-card{transform:scale(.2) translateY(20px);opacity:0;}
    body.anim-zoom   #alert-card.show{transform:scale(1) translateY(0);opacity:1;transition:opacity .3s ease,transform .45s cubic-bezier(.34,1.56,.64,1);}
    body.anim-zoom   #alert-card.hide{transform:scale(.2) translateY(20px);opacity:0;}
    body.anim-flip   #alert-card{transform:rotateY(90deg) scaleX(.6);opacity:0;}
    body.anim-flip   #alert-card.show{transform:rotateY(0deg) scaleX(1);opacity:1;transition:opacity .3s ease,transform .5s cubic-bezier(.34,1.2,.64,1);}
    body.anim-flip   #alert-card.hide{transform:rotateY(-90deg) scaleX(.6);opacity:0;}
    body.anim-drop   #alert-card{transform:translateY(-120px) rotate(-6deg) scale(.8);opacity:0;}
    body.anim-drop   #alert-card.show{transform:translateY(0) rotate(0) scale(1);opacity:1;transition:opacity .3s ease,transform .6s cubic-bezier(.22,1.5,.36,1);}
    body.anim-drop   #alert-card.hide{transform:translateY(60px) rotate(4deg) scale(.85);opacity:0;}

    .confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;}
    .cp{position:absolute;animation:cfFall linear forwards;opacity:0;}
    @keyframes cfFall{0%{opacity:1;transform:translateY(-20px) rotate(0deg)}100%{opacity:0;transform:translateY(110vh) rotate(720deg)}}
  </style>
</head>
<body class="anim-slide pos-top-right">
<div class="confetti-wrap" id="cw"></div>
<div id="alert-zone">
  <div id="alert-card">
    <div class="alert-bar"></div>
    <div class="alert-body">
      <div class="alert-header">
        <div class="alert-avatar" id="av">?</div>
        <div class="alert-name-wrap">
          <div class="alert-label">Donation 💜</div>
          <div class="alert-name" id="an">—</div>
        </div>
        <div class="alert-amount" id="aa">฿0</div>
      </div>
      <div class="alert-message" id="am" style="display:none;"></div>
    </div>
  </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
  let overlayId='';
  (async()=>{
    try{const cfg=await fetch('/api/template-config').then(r=>r.json());
      overlayId=cfg.overlayId||'default-overlay';
      applyTemplate(cfg);}catch(e){}
    const socket=io({auth:{overlayId}});
    socket.on('templateUpdate',applyTemplate);
    socket.on('alert',d=>{q.push(d);next();});
  })();

  function applyTemplate(cfg){
    const tpls=['classic','neon','minimal','gaming','cute'],anims=['slide','bounce','zoom','flip','drop'],pos=['top-right','top-left','bottom-right','bottom-left'];
    const name=tpls.includes(cfg.template)?cfg.template:'classic';
    document.getElementById('tpl-css').href='/templates/'+name+'.css';
    document.getElementById('tpl-custom').textContent=cfg.customCss||'';
    const b=document.body;
    anims.forEach(a=>b.classList.remove('anim-'+a));pos.forEach(p=>b.classList.remove('pos-'+p));
    b.classList.add('anim-'+(anims.includes(cfg.alertAnimation)?cfg.alertAnimation:'slide'));
    b.classList.add('pos-'+(pos.includes(cfg.alertPosition)?cfg.alertPosition:'top-right'));
  }

  let actx=null;
  function getCtx(){return actx||(actx=new(window.AudioContext||window.webkitAudioContext)());}
  function chime(amount){try{const ctx=getCtx(),play=(f,t,d,v=.25)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,ctx.currentTime+t);g.gain.linearRampToValueAtTime(v,ctx.currentTime+t+.015);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+d);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+d+.05);};if(amount>=500){play(523,0,.5,.3);play(659,.1,.5,.3);play(784,.2,.5,.3);play(1047,.35,.8,.25);}else if(amount>=100){play(659,0,.4,.25);play(784,.12,.4,.25);play(1047,.24,.6,.2);}else{play(784,0,.3,.2);play(1047,.15,.45,.18);}}catch(e){}}

  const q=[],COLORS=['#7c5cfc','#ec4899','#f59e0b','#22c55e','#38bdf8','#fff','#fb923c'];
  let busy=false;
  function next(){if(busy||!q.length)return;busy=true;show(q.shift());}
  function show(data){
    const name=data.displayName||'ไม่ระบุ',amount=data.amount??0;
    document.getElementById('av').textContent=name.charAt(0).toUpperCase();
    document.getElementById('an').textContent=name;
    document.getElementById('aa').textContent='฿'+amount.toLocaleString('th-TH');
    const m=document.getElementById('am');if(data.message){m.textContent=data.message;m.style.display='block';}else m.style.display='none';
    const card=document.getElementById('alert-card');
    card.classList.remove('hide');void card.offsetWidth;card.classList.add('show');
    chime(amount);
    if(data.ttsAudio){const isW=data.ttsAudio.startsWith('UklGR');setTimeout(()=>new Audio(`data:${isW?'audio/wav':'audio/mp3'};base64,${data.ttsAudio}`).play().catch(()=>{}),600);}
    if(amount>=100){const c=document.getElementById('cw');for(let i=0;i<(amount>=500?120:70);i++){const p=document.createElement('div'),sz=5+Math.random()*9;p.className='cp';p.style.cssText=`left:${Math.random()*100}%;top:0;background:${COLORS[~~(Math.random()*COLORS.length)]};width:${sz}px;height:${sz}px;border-radius:${Math.random()>.4?'50%':'2px'};animation-duration:${2.5+Math.random()*3}s;animation-delay:${Math.random()}s;`;c.appendChild(p);p.addEventListener('animationend',()=>p.remove());}}
    const dur=8000+(data.message?Math.min(data.message.length*40,3000):0);
    setTimeout(()=>{card.classList.remove('show');card.classList.add('hide');setTimeout(()=>{card.classList.remove('hide');busy=false;next();},350);},dur);
  }
</script>
</body>
</html>
