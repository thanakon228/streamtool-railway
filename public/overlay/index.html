<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>StreamTool Overlay</title>
  <!-- Template CSS (swapped live by JS) -->
  <link id="tpl-css" rel="stylesheet" href="/templates/classic.css">
  <style id="tpl-custom"></style>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; background:transparent; overflow:hidden;
      font-family:'Segoe UI','Noto Sans Thai',system-ui,sans-serif;
      perspective:1200px;
    }

    /* ── Alert zone position ───────────────────────────────────── */
    #alert-zone { position:fixed; width:420px; pointer-events:none;
      top:40px; right:40px; /* default: top-right */
    }
    body.pos-top-left     #alert-zone { top:40px;    left:40px;   right:auto; bottom:auto; }
    body.pos-bottom-right #alert-zone { bottom:180px;right:40px;  left:auto;  top:auto;    }
    body.pos-bottom-left  #alert-zone { bottom:180px;left:40px;   right:auto; top:auto;    }

    /* ── Alert card — uses template vars ───────────────────────── */
    #alert-card {
      background:    var(--t-alert-bg);
      border:        1.5px solid var(--t-alert-border);
      border-radius: var(--t-alert-radius, 18px);
      box-shadow:    var(--t-alert-shadow);
      overflow:hidden; position:relative;
      opacity:0; will-change:transform,opacity;
      transition: opacity .4s cubic-bezier(.34,1.3,.64,1),
                  transform .4s cubic-bezier(.34,1.3,.64,1);
    }
    #alert-card.hide { transition: opacity .28s ease-in, transform .28s ease-in !important; }
    #alert-card.show .alert-avatar { animation: avatarPop .5s cubic-bezier(.34,1.56,.64,1) .18s both; }
    #alert-card.show .alert-amount { animation: amountPop .5s cubic-bezier(.34,1.56,.64,1) .28s both; }
    @keyframes avatarPop { from{transform:scale(0) rotate(-12deg)} to{transform:scale(1) rotate(0)} }
    @keyframes amountPop { from{transform:scale(.4);opacity:0}     to{transform:scale(1);opacity:1} }

    /* accent bar */
    .alert-accent-bar {
      height:3px; background:var(--t-alert-bar);
      background-size:300% 100%; animation:gradShift 4s linear infinite;
    }
    @keyframes gradShift { 0%{background-position:0%} 100%{background-position:300%} }

    .alert-body   { padding:16px 20px 20px; }
    .alert-header { display:flex; align-items:center; gap:14px; margin-bottom:12px; }
    .alert-avatar {
      width:52px; height:52px; border-radius:50%;
      background:var(--t-avatar-bg);
      display:flex; align-items:center; justify-content:center;
      font-size:24px; font-weight:800; color:#fff; flex-shrink:0;
      box-shadow: 0 0 20px var(--t-avatar-glow), 0 0 40px color-mix(in srgb,var(--t-avatar-glow) 40%,transparent);
    }
    .alert-name-wrap { flex:1; min-width:0; }
    .alert-label { font-size:10px; color:var(--t-alert-label); text-transform:uppercase; letter-spacing:.1em; margin-bottom:3px; }
    .alert-name  { font-size:17px; font-weight:700; color:var(--t-alert-name); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .alert-amount{ font-size:30px; font-weight:900; color:var(--t-alert-amount);
      text-shadow: 0 0 22px var(--t-alert-amount-glow); white-space:nowrap; flex-shrink:0; }
    .alert-message{
      font-size:13px; color:var(--t-alert-msg-color); line-height:1.55;
      background:var(--t-alert-msg-bg); border-radius:9px;
      padding:10px 14px; margin-top:2px; border-left:2px solid var(--t-alert-msg-border);
    }

    /* ── Animations ────────────────────────────────────────────── */
    body.anim-slide          #alert-card      { transform:translateX(460px) scale(.92); }
    body.anim-slide          #alert-card.show { transform:translateX(0) scale(1); opacity:1; }
    body.anim-slide          #alert-card.hide { transform:translateX(460px) scale(.92); opacity:0; }
    body.pos-top-left.anim-slide    #alert-card      { transform:translateX(-460px) scale(.92); }
    body.pos-top-left.anim-slide    #alert-card.show { transform:translateX(0) scale(1); opacity:1; }
    body.pos-top-left.anim-slide    #alert-card.hide { transform:translateX(-460px) scale(.92); opacity:0; }
    body.pos-bottom-left.anim-slide #alert-card      { transform:translateX(-460px) scale(.92); }
    body.pos-bottom-left.anim-slide #alert-card.show { transform:translateX(0) scale(1); opacity:1; }
    body.pos-bottom-left.anim-slide #alert-card.hide { transform:translateX(-460px) scale(.92); opacity:0; }

    body.anim-bounce #alert-card      { transform:translateY(-90px) scale(.85); opacity:0; }
    body.anim-bounce #alert-card.show { transform:translateY(0) scale(1); opacity:1;
      transition:opacity .35s ease,transform .55s cubic-bezier(.22,1.8,.36,1); }
    body.anim-bounce #alert-card.hide { transform:translateY(-60px) scale(.88); opacity:0; }

    body.anim-zoom   #alert-card      { transform:scale(.2) translateY(20px); opacity:0; }
    body.anim-zoom   #alert-card.show { transform:scale(1) translateY(0); opacity:1;
      transition:opacity .3s ease,transform .45s cubic-bezier(.34,1.56,.64,1); }
    body.anim-zoom   #alert-card.hide { transform:scale(.2) translateY(20px); opacity:0; }

    body.anim-flip   #alert-card      { transform:rotateY(90deg) scaleX(.6); opacity:0; }
    body.anim-flip   #alert-card.show { transform:rotateY(0deg) scaleX(1); opacity:1;
      transition:opacity .3s ease,transform .5s cubic-bezier(.34,1.2,.64,1); }
    body.anim-flip   #alert-card.hide { transform:rotateY(-90deg) scaleX(.6); opacity:0; }

    body.anim-drop   #alert-card      { transform:translateY(-120px) rotate(-6deg) scale(.8); opacity:0; }
    body.anim-drop   #alert-card.show { transform:translateY(0) rotate(0) scale(1); opacity:1;
      transition:opacity .3s ease,transform .6s cubic-bezier(.22,1.5,.36,1); }
    body.anim-drop   #alert-card.hide { transform:translateY(60px) rotate(4deg) scale(.85); opacity:0; }

    /* ── Confetti ──────────────────────────────────────────────── */
    .confetti-wrap { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:hidden; }
    .cp { position:absolute; animation:cfFall linear forwards; opacity:0; }
    @keyframes cfFall {
      0%   { opacity:1; transform:translateY(-20px) rotate(0deg); }
      100% { opacity:0; transform:translateY(110vh) rotate(720deg); }
    }

    /* ── Chat ──────────────────────────────────────────────────── */
    #chat-zone { position:fixed; bottom:160px; left:40px; width:340px;
      display:flex; flex-direction:column; gap:6px; pointer-events:none; }
    .chat-msg {
      display:flex; align-items:flex-start; gap:8px;
      background:var(--t-chat-bg); border:1px solid var(--t-chat-border);
      border-radius:var(--t-chat-radius); padding:8px 12px;
      backdrop-filter:blur(var(--t-chat-blur)); animation:chatIn .3s ease;
    }
    @keyframes chatIn { from{opacity:0;transform:translateX(-16px)} to{opacity:1;transform:translateX(0)} }
    .chat-plat { width:18px; height:18px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:10px; flex-shrink:0; margin-top:1px; }
    .chat-plat.youtube { background:rgba(255,0,0,.2); }
    .chat-plat.tiktok  { background:rgba(0,0,0,.5); border:1px solid rgba(255,255,255,.1); }
    .chat-inner { flex:1; min-width:0; }
    .chat-name  { font-size:12px; font-weight:var(--t-chat-name-weight,700); margin-bottom:1px; }
    .chat-name.youtube { color:var(--t-chat-yt); }
    .chat-name.tiktok  { color:var(--t-chat-tt); }
    .chat-text  { font-size:13px; color:var(--t-chat-text); line-height:1.4; word-break:break-word; }

    /* ── Goal bar ──────────────────────────────────────────────── */
    #goal-zone {
      position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
      width:560px; max-width:calc(100vw - 80px);
      pointer-events:none; opacity:0; transition:opacity .5s ease;
    }
    #goal-zone.visible { opacity:1; }
    .goal-card {
      background:var(--t-goal-bg); border:1px solid var(--t-goal-border);
      border-radius:var(--t-goal-radius); padding:14px 18px;
      backdrop-filter:blur(var(--t-goal-blur));
      box-shadow:0 8px 32px rgba(0,0,0,.4);
    }
    .goal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .goal-title  { font-size:12px; font-weight:700; color:var(--t-goal-title); display:flex; align-items:center; gap:6px; }
    .goal-amounts{ font-size:13px; font-weight:700; }
    .goal-current{ color:var(--t-goal-current); text-shadow:0 0 14px var(--t-goal-current-glow); }
    .goal-sep    { color:rgba(128,128,128,.5); margin:0 4px; }
    .goal-target { color:var(--t-goal-target); }
    .goal-track  { height:10px; background:var(--t-goal-track); border-radius:99px; overflow:hidden; }
    .goal-fill   {
      height:100%; background:var(--t-goal-bar);
      box-shadow:0 0 12px var(--t-goal-bar-glow);
      border-radius:99px; width:0%; transition:width 1.2s cubic-bezier(.34,1.1,.64,1);
      position:relative; overflow:hidden;
    }
    .goal-fill::after {
      content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
      animation:gShimmer 2s ease infinite;
    }
    @keyframes gShimmer { to { left:200%; } }
    .goal-percent{ font-size:11px; color:var(--t-goal-percent); text-align:right; margin-top:5px; }
  </style>
</head>
<body class="anim-slide pos-top-right">

<div class="confetti-wrap" id="confetti-wrap"></div>

<!-- Alert -->
<div id="alert-zone">
  <div id="alert-card">
    <div class="alert-accent-bar"></div>
    <div class="alert-body">
      <div class="alert-header">
        <div class="alert-avatar" id="alert-avatar">?</div>
        <div class="alert-name-wrap">
          <div class="alert-label">Donation 💜</div>
          <div class="alert-name" id="alert-name">—</div>
        </div>
        <div class="alert-amount" id="alert-amount">฿0</div>
      </div>
      <div class="alert-message" id="alert-message" style="display:none;"></div>
    </div>
  </div>
</div>

<!-- Chat -->
<div id="chat-zone"></div>

<!-- Goal -->
<div id="goal-zone">
  <div class="goal-card">
    <div class="goal-header">
      <div class="goal-title"><span>🎯</span><span id="goal-title-text">Goal วันนี้</span></div>
      <div class="goal-amounts">
        <span class="goal-current" id="goal-current">฿0</span>
        <span class="goal-sep">/</span>
        <span class="goal-target" id="goal-target">฿0</span>
      </div>
    </div>
    <div class="goal-track"><div class="goal-fill" id="goal-fill"></div></div>
    <div class="goal-percent" id="goal-percent">0%</div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const overlayId = location.pathname.replace(/^\/overlay\/?/,'').split('/')[0];
  if (!overlayId) {
    document.body.innerHTML = '<div style="color:red;padding:20px;font-size:18px;">ไม่พบ Overlay ID — ตรวจสอบ URL</div>';
  } else { init(); }

  async function init() {
    try {
      const cfg = await fetch('/api/template-config').then(r => r.json());
      applyTemplate(cfg);
    } catch(e) {}

    const socket = io({ auth: { overlayId } });
    socket.on('templateUpdate', applyTemplate);
    socket.on('goalUpdate',     updateGoal);
    socket.on('alert', d => { alertQueue.push(d); processQueue(); });
    socket.on('chat',  appendChatMsg);
  }

  /* ── Template apply ──────────────────────────────────────────── */
  function applyTemplate(cfg) {
    // Swap stylesheet
    const link = document.getElementById('tpl-css');
    const name  = ['classic','neon','minimal','gaming','cute'].includes(cfg.template) ? cfg.template : 'classic';
    if (link.href !== location.origin + '/templates/' + name + '.css') link.href = '/templates/' + name + '.css';
    // Custom CSS
    document.getElementById('tpl-custom').textContent = cfg.customCss || '';
    // Animation + position classes
    const anims = ['slide','bounce','zoom','flip','drop'];
    const pos   = ['top-right','top-left','bottom-right','bottom-left'];
    const body  = document.body;
    anims.forEach(a => body.classList.remove('anim-'+a));
    pos  .forEach(p => body.classList.remove('pos-'+p));
    body.classList.add('anim-' + (anims.includes(cfg.alertAnimation) ? cfg.alertAnimation : 'slide'));
    body.classList.add('pos-'  + (pos  .includes(cfg.alertPosition)  ? cfg.alertPosition  : 'top-right'));
  }

  /* ── Audio ───────────────────────────────────────────────────── */
  let actx = null;
  function getCtx() { return actx || (actx = new (window.AudioContext||window.webkitAudioContext)()); }
  function playChime(amount) {
    try {
      const ctx = getCtx();
      const play = (f,t,d,v=.25)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,ctx.currentTime+t);g.gain.linearRampToValueAtTime(v,ctx.currentTime+t+.015);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+d);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+d+.05);};
      if (amount>=500){play(523,0,.5,.3);play(659,.1,.5,.3);play(784,.2,.5,.3);play(1047,.35,.8,.25);}
      else if(amount>=100){play(659,0,.4,.25);play(784,.12,.4,.25);play(1047,.24,.6,.2);}
      else{play(784,0,.3,.2);play(1047,.15,.45,.18);}
    }catch(e){}
  }

  /* ── Chat ────────────────────────────────────────────────────── */
  const MAX_CHAT = 5;
  function appendChatMsg(data) {
    const {platform='unknown',displayName='viewer',message=''} = data;
    const icon = platform==='youtube'?'▶':'♪';
    const zone = document.getElementById('chat-zone');
    const el   = document.createElement('div');
    el.className = 'chat-msg';
    el.innerHTML = `<div class="chat-plat ${platform}">${icon}</div><div class="chat-inner"><div class="chat-name ${platform}">${esc(displayName)}</div><div class="chat-text">${esc(message)}</div></div>`;
    zone.appendChild(el);
    while(zone.children.length > MAX_CHAT){
      const old=zone.children[0];old.style.transition='opacity .3s';old.style.opacity='0';
      setTimeout(()=>old.remove(),300);break;
    }
  }

  /* ── Alert queue ─────────────────────────────────────────────── */
  const alertQueue = []; let alertBusy = false;
  function processQueue() { if(alertBusy||!alertQueue.length)return; alertBusy=true; showAlert(alertQueue.shift()); }
  function showAlert(data) {
    const name=data.displayName||'ไม่ระบุ', amount=data.amount??0;
    document.getElementById('alert-avatar').textContent = name.charAt(0).toUpperCase();
    document.getElementById('alert-name').textContent   = name;
    document.getElementById('alert-amount').textContent = '฿'+amount.toLocaleString('th-TH');
    const msgEl = document.getElementById('alert-message');
    if(data.message){msgEl.textContent=data.message;msgEl.style.display='block';}
    else msgEl.style.display='none';
    const card = document.getElementById('alert-card');
    card.classList.remove('hide'); void card.offsetWidth; card.classList.add('show');
    playChime(amount);
    if(data.ttsAudio){
      const isWav=data.ttsAudio.startsWith('UklGR'),mime=isWav?'audio/wav':'audio/mp3';
      setTimeout(()=>new Audio(`data:${mime};base64,${data.ttsAudio}`).play().catch(()=>{}),600);
    }
    if(amount>=100)spawnConfetti(amount);
    const dur = 8000+(data.message?Math.min(data.message.length*40,3000):0);
    setTimeout(()=>{
      card.classList.remove('show');card.classList.add('hide');
      setTimeout(()=>{card.classList.remove('hide');alertBusy=false;processQueue();},350);
    },dur);
  }

  /* ── Confetti ────────────────────────────────────────────────── */
  const COLORS=['#7c5cfc','#ec4899','#f59e0b','#22c55e','#38bdf8','#fff','#fb923c'];
  function spawnConfetti(amount) {
    const count=amount>=500?120:amount>=100?70:40, c=document.getElementById('confetti-wrap');
    for(let i=0;i<count;i++){
      const p=document.createElement('div'),size=5+Math.random()*9,circle=Math.random()>.4;
      p.className='cp';
      p.style.cssText=`left:${Math.random()*100}%;top:0;background:${COLORS[~~(Math.random()*COLORS.length)]};width:${size}px;height:${size}px;border-radius:${circle?'50%':'2px'};animation-duration:${2.5+Math.random()*3}s;animation-delay:${Math.random()}s;`;
      c.appendChild(p);p.addEventListener('animationend',()=>p.remove());
    }
  }

  /* ── Goal ────────────────────────────────────────────────────── */
  function updateGoal(data) {
    const {current=0,target=0,title='Goal วันนี้'}=data;
    const zone=document.getElementById('goal-zone');
    if(!target||target<=0){zone.classList.remove('visible');return;}
    zone.classList.add('visible');
    document.getElementById('goal-title-text').textContent=title;
    document.getElementById('goal-current').textContent='฿'+current.toLocaleString('th-TH');
    document.getElementById('goal-target').textContent='฿'+target.toLocaleString('th-TH');
    const pct=Math.min(100,Math.round(current/target*100));
    document.getElementById('goal-fill').style.width=pct+'%';
    const pctEl=document.getElementById('goal-percent');
    pctEl.textContent=pct>=100?'🎉 ถึง Goal แล้ว!':pct+'%';
    pctEl.style.color=pct>=100?'var(--t-green)':'';
  }

  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
