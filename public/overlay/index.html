<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>StreamTool Overlay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; font-family: 'Segoe UI', 'Noto Sans Thai', system-ui, sans-serif; }

    /* ── Alert zone ── */
    #alert-zone { position: fixed; top: 50%; right: 40px; transform: translateY(-50%); width: 400px; pointer-events: none; }

    #alert-card {
      background: linear-gradient(135deg, rgba(15,12,35,0.97), rgba(25,18,55,0.97));
      border: 1px solid rgba(124,92,252,0.5);
      border-radius: 18px; overflow: hidden;
      box-shadow: 0 12px 50px rgba(124,92,252,0.35), 0 0 0 1px rgba(124,92,252,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
      opacity: 0; transform: translateX(440px) scale(0.95);
      transition: opacity 0.45s cubic-bezier(0.34,1.56,0.64,1), transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }
    #alert-card.show {
      opacity: 1; transform: translateX(0) scale(1);
    }
    #alert-card.hide {
      opacity: 0; transform: translateX(440px) scale(0.95);
      transition: opacity 0.3s ease-in, transform 0.3s ease-in;
    }
    #alert-card.show .alert-avatar { animation: avatarPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s both; }
    #alert-card.show .alert-amount { animation: amountPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.3s both; }
    @keyframes avatarPop { from{transform:scale(0) rotate(-10deg)} to{transform:scale(1) rotate(0deg)} }
    @keyframes amountPop { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }

    .alert-accent-bar { height: 3px; background: linear-gradient(90deg,#7c5cfc,#ec4899,#f59e0b,#22c55e,#7c5cfc); background-size: 300% 100%; animation: gradientShift 4s linear infinite; }
    @keyframes gradientShift { 0%{background-position:0%} 100%{background-position:300%} }

    .alert-body { padding: 18px 20px 20px; }
    .alert-header { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
    .alert-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg,#7c5cfc,#ec4899);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 800; color: white; flex-shrink: 0;
      box-shadow: 0 0 20px rgba(124,92,252,0.6), 0 0 40px rgba(124,92,252,0.2);
    }
    .alert-name-wrap { flex: 1; min-width: 0; }
    .alert-label { font-size: 10px; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 3px; }
    .alert-name  { font-size: 17px; font-weight: 700; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .alert-amount { font-size: 30px; font-weight: 900; color: #22c55e; text-shadow: 0 0 24px rgba(34,197,94,0.6); white-space: nowrap; flex-shrink: 0; }
    .alert-message {
      font-size: 13px; color: rgba(255,255,255,0.85); line-height: 1.55;
      background: rgba(255,255,255,0.05); border-radius: 9px;
      padding: 10px 14px; margin-top: 2px; border-left: 2px solid rgba(124,92,252,0.7);
    }

    /* ── Confetti ── */
    .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
    .confetti-piece { position: absolute; animation: confettiFall linear forwards; opacity: 0; }
    @keyframes confettiFall { 0%{opacity:1;transform:translateY(-20px) rotate(0deg)} 100%{opacity:0;transform:translateY(110vh) rotate(720deg)} }

    /* ── Chat ── */
    #chat-zone { position: fixed; bottom: 160px; left: 40px; width: 340px; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
    .chat-msg { display: flex; align-items: flex-start; gap: 8px; background: rgba(12,14,22,0.82); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 8px 12px; backdrop-filter: blur(10px); animation: chatSlideIn 0.3s ease; }
    @keyframes chatSlideIn { from{opacity:0;transform:translateX(-16px)} to{opacity:1;transform:translateX(0)} }
    .chat-platform { width: 18px; height: 18px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; margin-top: 1px; }
    .chat-platform.youtube { background: rgba(255,0,0,0.2); }
    .chat-platform.tiktok  { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
    .chat-content { flex: 1; min-width: 0; }
    .chat-name { font-size: 12px; font-weight: 700; margin-bottom: 1px; }
    .chat-name.youtube { color: #ff5555; }
    .chat-name.tiktok  { color: #69c9d0; }
    .chat-text { font-size: 13px; color: rgba(255,255,255,0.88); line-height: 1.4; word-break: break-word; }

    /* ── Goal bar ── */
    #goal-zone {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      width: 560px; max-width: calc(100vw - 80px);
      pointer-events: none;
      opacity: 0; transition: opacity 0.5s ease;
    }
    #goal-zone.visible { opacity: 1; }
    .goal-card {
      background: rgba(12,14,22,0.88); border: 1px solid rgba(124,92,252,0.35);
      border-radius: 14px; padding: 14px 18px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .goal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .goal-title  { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.7); display: flex; align-items: center; gap: 6px; }
    .goal-title-icon { font-size: 14px; }
    .goal-amounts { font-size: 13px; font-weight: 700; }
    .goal-current { color: #22c55e; }
    .goal-sep     { color: rgba(255,255,255,0.3); margin: 0 4px; }
    .goal-target  { color: rgba(255,255,255,0.6); }
    .goal-track {
      height: 10px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden;
    }
    .goal-fill {
      height: 100%; background: linear-gradient(90deg, #7c5cfc, #22c55e);
      border-radius: 99px; width: 0%; transition: width 1.2s cubic-bezier(0.34,1.1,0.64,1);
      box-shadow: 0 0 12px rgba(34,197,94,0.5);
      position: relative; overflow: hidden;
    }
    .goal-fill::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: goalShimmer 2s ease infinite;
    }
    @keyframes goalShimmer { to { left: 200%; } }
    .goal-percent {
      font-size: 11px; color: rgba(255,255,255,0.4); text-align: right; margin-top: 5px;
    }
  </style>
</head>
<body>

<div class="confetti-container" id="confetti-container"></div>

<!-- Alert -->
<div id="alert-zone">
  <div id="alert-card">
    <div class="alert-accent-bar"></div>
    <div class="alert-body">
      <div class="alert-header">
        <div class="alert-avatar" id="alert-avatar">?</div>
        <div class="alert-name-wrap">
          <div class="alert-label">Donation 💜</div>
          <div class="alert-name" id="alert-name">—</div>
        </div>
        <div class="alert-amount" id="alert-amount">฿0</div>
      </div>
      <div class="alert-message" id="alert-message" style="display:none;"></div>
    </div>
  </div>
</div>

<!-- Chat -->
<div id="chat-zone"></div>

<!-- Goal Bar -->
<div id="goal-zone">
  <div class="goal-card">
    <div class="goal-header">
      <div class="goal-title"><span class="goal-title-icon">🎯</span><span id="goal-title-text">Goal วันนี้</span></div>
      <div class="goal-amounts">
        <span class="goal-current" id="goal-current">฿0</span>
        <span class="goal-sep">/</span>
        <span class="goal-target" id="goal-target">฿0</span>
      </div>
    </div>
    <div class="goal-track"><div class="goal-fill" id="goal-fill"></div></div>
    <div class="goal-percent" id="goal-percent">0%</div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const overlayId = location.pathname.replace(/^\/overlay\/?/, '').split('/')[0];
  if (!overlayId) {
    document.body.innerHTML = '<div style="color:red;padding:20px;">ไม่พบ Overlay ID</div>';
  } else {
    const socket = io({ auth: { overlayId } });

    // ── Alert sound (Web Audio API) ────────────────────────────────────────
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playChime(amount) {
      try {
        const ctx = getAudioCtx();
        const play = (freq, startAt, dur, vol = 0.25) => {
          const osc  = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0, ctx.currentTime + startAt);
          gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + startAt + 0.015);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startAt + dur);
          osc.start(ctx.currentTime + startAt);
          osc.stop(ctx.currentTime + startAt + dur + 0.05);
        };
        if (amount >= 500) {
          // Big donation — 4 note fanfare
          play(523, 0,    0.5, 0.3);  // C5
          play(659, 0.1,  0.5, 0.3);  // E5
          play(784, 0.2,  0.5, 0.3);  // G5
          play(1047,0.35, 0.8, 0.25); // C6
        } else if (amount >= 100) {
          // Medium — 3 note chime
          play(659, 0,    0.4, 0.25); // E5
          play(784, 0.12, 0.4, 0.25); // G5
          play(1047,0.24, 0.6, 0.2);  // C6
        } else {
          // Small — 2 note ping
          play(784, 0,    0.3, 0.2);  // G5
          play(1047,0.15, 0.45, 0.18); // C6
        }
      } catch(e) {}
    }

    // ── Chat ────────────────────────────────────────────────────────────────
    const MAX_CHAT = 5;
    socket.on('chat', appendChatMsg);

    function appendChatMsg(data) {
      const { platform = 'unknown', displayName = 'viewer', message = '', sentAt } = data;
      const icon = platform === 'youtube' ? '▶' : '♪';
      const zone = document.getElementById('chat-zone');
      const el   = document.createElement('div');
      el.className = 'chat-msg';
      el.innerHTML = `
        <div class="chat-platform ${platform}">${icon}</div>
        <div class="chat-content">
          <div class="chat-name ${platform}">${esc(displayName)}</div>
          <div class="chat-text">${esc(message)}</div>
        </div>`;
      zone.appendChild(el);
      while (zone.children.length > MAX_CHAT) {
        const old = zone.children[0];
        old.style.transition = 'opacity 0.3s, transform 0.3s';
        old.style.opacity = '0'; old.style.transform = 'translateX(-16px)';
        setTimeout(() => old.remove(), 300);
        break;
      }
    }

    // ── Alert ───────────────────────────────────────────────────────────────
    const alertQueue = [];
    let alertBusy = false;

    socket.on('alert', (data) => { alertQueue.push(data); processQueue(); });

    function processQueue() {
      if (alertBusy || alertQueue.length === 0) return;
      alertBusy = true;
      showAlert(alertQueue.shift());
    }

    function showAlert(data) {
      const name   = data.displayName || 'ไม่ระบุ';
      const amount = data.amount ?? 0;

      document.getElementById('alert-avatar').textContent = name.charAt(0).toUpperCase();
      document.getElementById('alert-name').textContent   = name;
      document.getElementById('alert-amount').textContent = `฿${amount.toLocaleString('th-TH')}`;

      const msgEl = document.getElementById('alert-message');
      if (data.message) { msgEl.textContent = data.message; msgEl.style.display = 'block'; }
      else { msgEl.style.display = 'none'; }

      const card = document.getElementById('alert-card');
      card.classList.remove('hide');
      void card.offsetWidth; // reflow
      card.classList.add('show');

      // เสียง chime ก่อน TTS
      playChime(amount);

      // TTS
      if (data.ttsAudio) {
        setTimeout(() => {
          const audio = new Audio(`data:audio/mp3;base64,${data.ttsAudio}`);
          audio.play().catch(() => {});
        }, 600);
      }

      if (amount >= 100) spawnConfetti(amount);

      const duration = 8000 + (data.message ? Math.min(data.message.length * 40, 3000) : 0);
      setTimeout(() => {
        card.classList.remove('show');
        card.classList.add('hide');
        setTimeout(() => { card.classList.remove('hide'); alertBusy = false; processQueue(); }, 350);
      }, duration);
    }

    // ── Confetti ─────────────────────────────────────────────────────────────
    const COLORS = ['#7c5cfc','#ec4899','#f59e0b','#22c55e','#38bdf8','#fff','#fb923c'];
    function spawnConfetti(amount) {
      const count = amount >= 500 ? 120 : amount >= 100 ? 70 : 40;
      const c = document.getElementById('confetti-container');
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-piece';
        const size = 5 + Math.random() * 9;
        const isCircle = Math.random() > 0.4;
        p.style.cssText = `left:${Math.random()*100}%;top:0;background:${COLORS[Math.floor(Math.random()*COLORS.length)]};width:${size}px;height:${size}px;border-radius:${isCircle?'50%':'2px'};animation-duration:${2.5+Math.random()*3}s;animation-delay:${Math.random()*1}s;`;
        c.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }
    }

    // ── Goal Bar ──────────────────────────────────────────────────────────────
    socket.on('goalUpdate', updateGoal);

    function updateGoal(data) {
      const { current = 0, target = 0, title = 'Goal วันนี้' } = data;
      const zone = document.getElementById('goal-zone');

      if (!target || target <= 0) {
        zone.classList.remove('visible');
        return;
      }

      zone.classList.add('visible');
      document.getElementById('goal-title-text').textContent = title;
      document.getElementById('goal-current').textContent = `฿${Number(current).toLocaleString('th-TH')}`;
      document.getElementById('goal-target').textContent  = `฿${Number(target).toLocaleString('th-TH')}`;

      const pct = Math.min(100, Math.round((current / target) * 100));
      document.getElementById('goal-fill').style.width = `${pct}%`;
      document.getElementById('goal-percent').textContent = `${pct}%`;

      // เปลี่ยนสีเมื่อถึง goal
      if (pct >= 100) {
        document.getElementById('goal-fill').style.background = 'linear-gradient(90deg,#22c55e,#f59e0b)';
        document.getElementById('goal-percent').textContent = '🎉 ถึง Goal แล้ว!';
      }
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  }
</script>
</body>
</html>
